version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proxmox-manager-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_postgres_password
      POSTGRES_DB: geona_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ballantine04/geona:backend-dev
    container_name: proxmox-manager-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./uploaded_images:/app/uploaded_images
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://postgres:dev_postgres_password@postgres:5432/geona_dev
      - UPLOAD_DIR=/app/uploaded_images

  frontend:
    image: ballantine04/geona:frontend-dev
    container_name: proxmox-manager-frontend-dev
    restart: unless-stopped
    ports:
      - "8116:8116"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
